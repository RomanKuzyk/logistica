name: mobile_app_flutter
description: Android-first Flutter port of the GlobalCars legacy mobile app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.5
  http: ^1.3.0
  mobile_scanner: ^7.0.1
  shared_preferences: ^2.5.3
  package_info_plus: ^8.3.0
  device_info_plus: ^11.5.0
  android_id: ^0.4.0
  uuid: ^4.5.1
  amplify_flutter: ^2.6.5
  amplify_auth_cognito: ^2.6.5
  amplify_storage_s3: ^2.6.5
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
